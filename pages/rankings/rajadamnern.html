<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>อันดับนักมวยเวทีราชดำเนิน | BoxingFandom</title>
    
    <style>
        /* ดึง Style หลักจากหน้าแรกมาใช้ เพื่อให้ดีไซน์เป็นไปในทิศทางเดียวกัน */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f4f4; color: #333; line-height: 1.6; }
        
        header { background-color: #1a1a1a; color: #ffffff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #004d40; }
        .text-red { color: #e50914; }
        .text-gold { color: #d4af37; } /* สีทองสำหรับราชดำเนิน */

        main { max-width: 1000px; margin: 40px auto; padding: 20px; background: #fff; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        .raja-header { text-align: center; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 20px; }
        .raja-logo { width: 120px; margin-bottom: 15px; }

        /* ส่วนเลือกหมวดหมู่รุ่นน้ำหนัก */
        .filter-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 18px; border: 1px solid #004d40; background: none; cursor: pointer; border-radius: 20px; transition: 0.3s; font-weight: bold; color: #004d40; }
        .filter-btn:hover { background: #e6f0ee; }
        .filter-btn.active { background: #004d40; color: white; }

        /* ตารางจัดอันดับ */
        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .ranking-table th { background-color: #f8f9fa; padding: 15px; text-align: left; border-bottom: 2px solid #004d40; }
        .ranking-table td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .rank-col { width: 80px; font-weight: bold; font-size: 1.2rem; text-align: center; }
        .fighter-cell { display: flex; align-items: center; gap: 15px; }
        
        /* สไตล์รูปนักมวย */
        .fighter-img { 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 2px solid #eee; 
            background-color: #f9f9f9;
        }
        
        /* สัญลักษณ์ประเทศ */
        .country-badge {
            background-color: #eee;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            color: #555;
            border: 1px solid #ddd;
            margin-right: 5px;
        }

        .source-ref { text-align: center; margin-top: 30px; font-size: 0.85rem; color: #888; }
        footer { text-align: center; padding: 40px; color: #888; }
        
        /* อนิเมชั่นตอนโหลดข้อมูล */
        .loading-text { color: #888; text-align: center; padding: 40px; font-style: italic; }
    </style>
</head>
<body>

    <header>
        <h1><span class="text-red">Boxing</span>Fandom <span style="font-size: 0.6em; color: #ccc;">x</span> <span class="text-gold">Rajadamnern</span></h1>
        <a href="../../index.html" style="color: white; text-decoration: none;">&larr; กลับหน้าหลัก</a>
    </header>

    <main>
        <div class="raja-header">
            <h2 style="font-size: 2rem; color: #1a1a1a;">OFFICIAL RANKINGS</h2>
            <p style="color: #666;">อันดับนักมวยอย่างเป็นทางการของเวทีราชดำเนิน </p>
        </div>

        <div class="filter-container" id="division-filters">
            <button class="filter-btn active" onclick="changeDivision(this, 'bantamweight')">Bantamweight</button>
            <button class="filter-btn" onclick="changeDivision(this, 'super-bantamweight')">Super Bantamweight</button>
            <button class="filter-btn" onclick="changeDivision(this, 'featherweight')">Featherweight</button>
            <button class="filter-btn" onclick="changeDivision(this, 'lightweight')">Lightweight</button>
            <button class="filter-btn" onclick="changeDivision(this, 'super-welterweight')">Super Welterweight</button>
            <button class="filter-btn" onclick="changeDivision(this, 'middleweight')">Middleweight</button>
        </div>

        <table class="ranking-table">
            <thead>
                <tr>
                    <th>อันดับ</th>
                    <th>นักมวย</th>
                    <th>สถาบัน / สังกัด</th>
                </tr>
            </thead>
            <tbody id="raja-ranking-body">
                <tr>
                    <td colspan="3" class="loading-text">
                        กำลังดึงข้อมูลล่าสุดจาก Rajadamnern Stadium...
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="source-ref">
            ข้อมูลอ้างอิงโดยตรงจาก: <a href="https://rank.rajadamnern.com/rankings" target="_blank" style="color: #004d40;">rank.rajadamnern.com</a>
            <br>อัปเดตข้อมูลล่าสุดเมื่อ: <span id="last-update">-</span>
        </div>
    </main>

    <footer>
        <p>© 2026 BoxingFandom. All Rights Reserved.</p>
    </footer>

    <script>
        // ==========================================
        // ฟังก์ชันเปลี่ยนสีปุ่มและโหลดข้อมูล
        // ==========================================
        function changeDivision(btnElement, divisionName) {
            // ลบคลาส active ออกจากปุ่มทั้งหมด
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            // เพิ่มคลาส active ให้ปุ่มที่ถูกคลิก
            btnElement.classList.add('active');
            
            // โหลดข้อมูล
            loadRajaData(divisionName);
        }

        // ==========================================
        // ฟังก์ชันดึงข้อมูล JSON มาแสดงผล
        // ==========================================
        async function loadRajaData(division) {
            const tbody = document.getElementById('raja-ranking-body');
            tbody.innerHTML = '<tr><td colspan="3" class="loading-text">กำลังโหลดข้อมูล...</td></tr>';
            
            try {
                // ดึงไฟล์ JSON ตามรุ่นน้ำหนัก (path อิงจากโครงสร้างโปรเจกต์ของคุณ)
                const res = await fetch(`../../data/rankings/raja/${division}.json`);
                if (!res.ok) throw new Error('ไม่พบไฟล์ข้อมูลรุ่นนี้');
                
                const data = await res.json();
                let html = '';

                // เช็คว่ามีข้อมูลนักมวยหรือไม่
                if (!data.fighters || data.fighters.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#888;">ยังไม่มีข้อมูลนักมวยในรุ่นนี้</td></tr>';
                    return;
                }
                
                // วนลูปสร้างแถวตาราง
                data.fighters.forEach(item => {
                    // จัดการรูปภาพ (ถ้าไม่มีรูป ให้ใช้ placeholder เงาดำ หรือรูประดับพื้นฐาน)
                    const imgUrl = item.image_url ? item.image_url : 'https://via.placeholder.com/50x50/eeeeee/cccccc?text=Fighter';
                    
                    // จัดการป้ายสัญชาติ
                    const countryBadge = item.country ? `<span class="country-badge">${item.country}</span>` : '';

                    // ตรวจสอบว่าเป็นแชมป์หรือไม่ (อันดับ C)
                    const isChamp = item.rank === 'C';
                    const rankStyle = isChamp ? 'color: #d4af37; font-size: 1.8rem;' : 'color: #333;';
                    const rankDisplay = isChamp ? '👑' : item.rank;
                    const nameColor = isChamp ? '#d4af37' : '#1a1a1a';

                    html += `
                        <tr>
                            <td class="rank-col" style="${rankStyle}">${rankDisplay}</td>
                            <td>
                                <div class="fighter-cell">
                                    <img src="${imgUrl}" alt="${item.name}" class="fighter-img" style="${isChamp ? 'border-color: #d4af37;' : ''}">
                                    <div>
                                        <div style="font-weight: bold; color: ${nameColor}; font-size: 1.1rem;">${item.name}</div>
                                        <div style="font-size: 0.85rem; color: #666; margin-top: 4px;">
                                            ${countryBadge} Rajadamnern World Series
                                        </div>
                                    </div>
                                </div>
                            </td>
                            <td style="font-size: 0.95rem; color: #555;">-</td>
                        </tr>
                    `;
                });

                tbody.innerHTML = html;
                
                // อัปเดตวันที่ล่าสุด (แปลง format ให้สวยงาม)
                const dateObj = new Date(data.last_updated);
                const formattedDate = dateObj.toLocaleDateString('th-TH', {
                    year: 'numeric', month: 'long', day: 'numeric',
                    hour: '2-digit', minute: '2-digit'
                });
                document.getElementById('last-update').innerText = `${formattedDate} น.`;

            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#e74c3c; padding: 30px;">ไม่สามารถโหลดข้อมูลได้ หรือบ็อตยังไม่ได้ดึงข้อมูลรุ่นนี้มา</td></tr>';
            }
        }

        // ==========================================
        // เริ่มต้นทำงานเมื่อเปิดหน้า
        // ==========================================
        // โหลดรุ่น Bantamweight ทันที
        window.onload = () => {
            loadRajaData('bantamweight');
        };
    </script>
</body>
</html>
