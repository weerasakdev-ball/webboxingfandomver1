name: BoxingFandom Auto Scraper

on:
  schedule:
    - cron: '0 17 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          npm install
          npx puppeteer browsers install chrome

      - name: Run Bot
        run: node real_scraper_bot.js

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add .
          git commit -m "🤖 Auto-update: Boxing statistics" || echo "No changes to commit"
          git push