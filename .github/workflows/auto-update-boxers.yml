name: Auto MuayThai Scraper

on:
  schedule:
    - cron: '0 17 * * 4'  # เที่ยงคืนวันศุกร์ (พฤหัส 17:00 UTC)
  workflow_dispatch:      # ปุ่มกดรันเอง

permissions:
  contents: write         # มอบสิทธิ์ให้บอทเขียนไฟล์ลง Repo ได้

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Code
      uses: actions/checkout@v4

    - name: ⚙️ Setup Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 📦 Install Dependencies
      run: |
        npm install
        # 🔑 แก้ปัญหา Permission Denied: เปิดสิทธิ์ให้โฟลเดอร์ทำงานได้
        chmod -R +x node_modules/.bin/

    - name: 🌐 Install Chrome for Puppeteer
      run: npx puppeteer browsers install chrome

    - name: 🤖 Run MuayThai Bot
      run: node real_scraper_bot.js

    - name: 💾 Update Database & Website
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add .
        # ป้องกัน Error กรณีไม่มีข้อมูลใหม่
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 อัปเดตสถิติอัตโนมัติ" && git push)