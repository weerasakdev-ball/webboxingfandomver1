name: Boxing-Scraper

on:
  schedule:
    # ตั้งเวลารันทุกวันพฤหัสบดี เวลา 17:00 UTC (ตรงกับ เที่ยงคืนวันศุกร์ไทย)
    - cron: '0 17 * * 4'
  workflow_dispatch: # ปุ่มกดรันเองจากหน้า GitHub

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies & Browser
        run: |
          npm install
          # แก้ปัญหา Permission Denied โดยการเรียกใช้ผ่าน path โดยตรง
          ./node_modules/.bin/puppeteer browsers install chrome

      - name: Run Scraper Bot
        run: node real_scraper_bot.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add .
          # บันทึกการเปลี่ยนแปลง ถ้าไม่มีข้อมูลใหม่ให้ข้ามไป
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update: Boxing Statistics" && git push)