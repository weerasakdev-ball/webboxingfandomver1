name: Sniper Bot

on:
  workflow_dispatch:

jobs:
  sniper:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Sniper Bot
        run: node scripts/scraper-bot.js

      - name: Commit updated data
        run: |
          git config user.name "BoxingFandom Bot"
          git config user.email "bot@boxingfandom.com"
          git add data/boxers/*.json update_list.txt
          git diff --staged --quiet || git commit -m "🤖 Sniper update: $(date +'%Y-%m-%d %H:%M')"
          git push