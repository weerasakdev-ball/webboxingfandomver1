<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สไนเปอร์บอท | BoxingFandom Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="_shared.js"></script>
  <style>
    .log-stream {
      background: #0f172a;
      border-radius: 10px;
      padding: 20px;
      min-height: 120px;
      max-height: 500px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.8;
      color: #94a3b8;
      margin-top: 20px;
      display: none;
      border: 1px solid #1e293b;
      scroll-behavior: smooth;
    }
    .log-stream.show { display: block; }
    .l-ok   { color: #86efac; }
    .l-err  { color: #fca5a5; }
    .l-info { color: #7dd3fc; }
    .l-warn { color: #fde68a; }
    .l-dim  { color: #334155; }
    .l-done { color: #34d399; font-weight: bold; }

    .status-bar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #1e293b;
      border-radius: 8px;
      margin-top: 16px;
      font-size: 14px;
      color: #cbd5e1;
    }
    .status-bar.show { display: flex; }

    .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #22c55e; flex-shrink: 0;
      animation: blink 1s ease-in-out infinite;
    }
    .dot.idle  { background: #34d399; animation: none; }
    .dot.error { background: #f87171; animation: none; }
    @keyframes blink {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.3; transform:scale(0.75); }
    }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin {
      display: inline-block; width:13px; height:13px;
      border:2px solid rgba(255,255,255,0.25);
      border-top-color:#fff; border-radius:50%;
      animation:spin 0.6s linear infinite;
      vertical-align: middle; margin-right:6px;
    }

    .gh-link {
      display: inline-block;
      margin-top: 10px;
      color: #7dd3fc;
      font-size: 13px;
      text-decoration: none;
    }
    .gh-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <div class="main">

    <div class="page-title">สไนเปอร์บอท</div>

    <div class="card">
      <div class="card-title">🎯 ดึงข้อมูลเฉพาะรายชื่อที่กำหนด</div>
      <p class="card-desc">
        พิมพ์ชื่อนักมวยบรรทัดละ 1 คน บอทจะดึงข้อมูลล่าสุดจาก ONE FC
        และ THBoxing ผ่าน GitHub Actions ครับ
      </p>

      <div class="form-group">
        <label>รายชื่อนักมวย</label>
        <textarea id="names" rows="8"
          style="padding:12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;
                 resize:vertical;width:100%;outline:none;margin-top:6px;line-height:1.9;
                 font-family:'Sarabun',sans-serif"
          placeholder="รถถัง จิตรเมืองนนท์&#10;น้องโอ๋ ฮาม่ามวยไทย&#10;ซุปเปอร์เล็ก จิตรเมืองนนท์"></textarea>
      </div>

      <div class="form-actions">
        <button id="fireBtn" class="btn btn-red" onclick="fire()">🚀 ลั่นไกสไนเปอร์</button>
        <button class="btn btn-ghost" onclick="clearAll()">🗑️ ล้าง</button>
      </div>

      <!-- Status -->
      <div id="statusBar" class="status-bar">
        <div id="dot" class="dot"></div>
        <span id="statusTxt">กำลังรัน...</span>
      </div>

      <!-- Log -->
      <div id="logStream" class="log-stream"></div>

    </div>
  </div>

  <script>
    let pollInterval = null;
    let running = false;

    function getNames() {
      return document.getElementById('names').value
        .split('\n').map(n => n.trim()).filter(Boolean);
    }

    function clearAll() {
      if (running) return;
      document.getElementById('names').value = '';
      document.getElementById('logStream').classList.remove('show');
      document.getElementById('logStream').innerHTML = '';
      document.getElementById('statusBar').classList.remove('show');
    }

    function setUI(state) {
      const btn = document.getElementById('fireBtn');
      const bar = document.getElementById('statusBar');
      const dot = document.getElementById('dot');
      const txt = document.getElementById('statusTxt');

      if (state === 'running') {
        running = true;
        btn.disabled = true;
        btn.innerHTML = '<span class="spin"></span>กำลังรัน...';
        bar.classList.add('show');
        dot.className = 'dot';
        txt.textContent = '🤖 GitHub Actions กำลังทำงาน...';
      } else if (state === 'done') {
        running = false;
        btn.disabled = false;
        btn.innerHTML = '🚀 ลั่นไกสไนเปอร์';
        dot.className = 'dot idle';
        txt.textContent = '✅ เสร็จสิ้น!';
        toast('บอทดึงข้อมูลเสร็จแล้ว', 'success');
      } else if (state === 'error') {
        running = false;
        btn.disabled = false;
        btn.innerHTML = '🚀 ลั่นไกสไนเปอร์';
        dot.className = 'dot error';
        txt.textContent = '❌ เกิดข้อผิดพลาด';
        toast('เกิดข้อผิดพลาด', 'error');
      }
    }

    function appendLog(line, cls) {
      const box = document.getElementById('logStream');
      box.classList.add('show');
      const div = document.createElement('div');
      if (cls) div.className = cls;
      div.textContent = line;
      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    function stopPolling() {
      if (pollInterval) { clearInterval(pollInterval); pollInterval = null; }
    }

    async function pollStatus() {
      try {
        const res  = await fetch('/api/sniper/stream');
        const data = await res.json();
        if (!data.ok) return;

        // อัปเดต status text
        document.getElementById('statusTxt').textContent = data.message;

        if (data.status === 'completed') {
          stopPolling();
          // แสดงผลสุดท้าย
          appendLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'l-dim');
          if (data.conclusion === 'success') {
            appendLog('✅ GitHub Actions ทำงานเสร็จสิ้น! ข้อมูลอัปเดตแล้ว', 'l-done');
          } else {
            appendLog(`❌ GitHub Actions หยุดทำงาน: ${data.conclusion}`, 'l-err');
          }
          if (data.html_url) {
            const box = document.getElementById('logStream');
            const a = document.createElement('a');
            a.href = data.html_url;
            a.target = '_blank';
            a.className = 'gh-link';
            a.textContent = '🔗 ดู log ละเอียดใน GitHub Actions';
            box.appendChild(a);
          }
          setUI(data.conclusion === 'success' ? 'done' : 'error');
        } else if (data.status === 'in_progress' || data.status === 'queued') {
          appendLog(`⏳ สถานะ: ${data.status} — ${data.message}`, 'l-info');
        }
      } catch (e) {
        stopPolling();
        setUI('error');
      }
    }

    async function fire() {
      const names = getNames();
      if (!names.length) return toast('กรุณาระบุชื่อนักมวยอย่างน้อย 1 คน', 'error');
      if (running) return toast('บอทกำลังทำงานอยู่ครับ', 'error');

      // ล้าง log เก่า
      const box = document.getElementById('logStream');
      box.innerHTML = '';
      box.classList.remove('show');
      stopPolling();

      // 1. POST trigger sniper
      const res  = await fetch('/api/sniper', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ names: names.join('\n') })
      });
      const data = await res.json();

      if (!data.ok) {
        appendLog(`❌ ${data.message}`, 'l-err');
        return toast(data.message, 'error');
      }

      appendLog('🎯 ส่งคำสั่ง Sniper ไปยัง GitHub Actions แล้ว', 'l-info');
      appendLog(`📋 รายชื่อ: ${names.join(', ')}`, 'l-info');
      appendLog('⏳ รอ GitHub Actions เริ่มทำงาน...', 'l-warn');
      appendLog('━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'l-dim');

      setUI('running');

      // 2. รอ 5 วินาทีให้ Actions เริ่มก่อน แล้วค่อย poll
      await new Promise(r => setTimeout(r, 5000));
      pollInterval = setInterval(pollStatus, 8000);
      pollStatus(); // poll ทันทีรอบแรก
    }
  </script>

  <script>
    injectSharedCSS();
    renderSidebar('sniper');
    checkAuth();
  </script>
</body>
</html>
